<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library - ReadEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        /* Tabs */
        .library-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.6rem 1.25rem;
            background: transparent;
            border: none;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Search & Filter Bar */
        .search-filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-wrapper {
            flex: 1;
            max-width: 350px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .search-wrapper input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-options {
            display: flex;
            gap: 0.5rem;
        }

        .filter-select {
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
        }

        .library-book-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .library-book-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .book-details {
            padding: 1rem;
        }

        .book-title-small {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .book-author-small {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .book-genre-small {
            display: inline-block;
            font-size: 0.7rem;
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }

        /* Progress Bar */
        .progress-wrapper {
            margin: 0.5rem 0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--muted);
            margin-bottom: 0.25rem;
        }

        .progress-bar-bg {
            background: var(--border);
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .book-actions-small {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid transparent;
        }

        .read-btn {
            background: var(--primary);
            color: white;
        }

        .remove-btn {
            background: transparent;
            color: #ef4444;
            border-color: #ef4444;
        }

        .favorite-btn {
            background: transparent;
            color: var(--gold);
            border-color: var(--gold);
        }

        .favorite-btn.active {
            background: var(--gold);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            color: #0a2540;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #8B4513;
        }

        .loading-spinner i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ========== FOOTER ========== */
        .site-footer {
            background: linear-gradient(180deg, #0c2744 0%, #061526 100%);
            color: #cbd5e1;
            margin-top: 3rem;
            padding: 2rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer-bottom-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.35rem 1rem;
            margin-bottom: 0.65rem;
        }

        .footer-bottom-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.82rem;
        }

        .footer-bottom-links a:hover {
            color: #fbbf24;
        }

        /* ========== DARK MODE ========== */
        body.dark-mode {
            background: #0f172a;
            color: #e2e8f0;
        }

        body.dark-mode .navbar {
            background: #111827;
            border-color: #1f2937;
        }

        body.dark-mode .logo a {
            color: #fbbf24;
        }

        body.dark-mode .nav-primary>li>a {
            color: #cbd5e1;
        }

        body.dark-mode .nav-primary>li>a:hover {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        body.dark-mode .stat-card,
        body.dark-mode .library-book-card,
        body.dark-mode .empty-state {
            background: #1f2937;
            border-color: #334155;
        }

        body.dark-mode .stat-value {
            color: #fbbf24;
        }

        body.dark-mode .book-title-small {
            color: #e2e8f0;
        }

        body.dark-mode .search-wrapper input,
        body.dark-mode .filter-select {
            background: #111827;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark-mode .theme-toggle {
            background: #1f2937;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark-mode .theme-toggle:hover {
            border-color: #fbbf24;
            color: #fbbf24;
        }

        body.dark-mode .site-footer {
            background: linear-gradient(180deg, #020617 0%, #000 100%);
        }

        body.dark-mode .tab-btn {
            color: #94a3b8;
        }

        body.dark-mode .tab-btn.active {
            background: #fbbf24;
            color: #0f172a;
        }

        body.dark-mode .progress-bar-bg {
            background: #334155;
        }

        /* ========== MOBILE ========== */
        @media (max-width: 768px) {
            .library-book-card {
                flex-direction: column;
            }

            .book-cover-small {
                width: 100%;
            }

            .book-cover-small img {
                height: 180px;
            }

            .search-filter-bar {
                flex-direction: column;
            }

            .search-wrapper {
                max-width: 100%;
                width: 100%;
            }

            .filter-options {
                width: 100%;
            }

            .filter-select {
                flex: 1;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .menu-toggle {
                display: inline-flex;
            }

            .nav-drawer {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                padding: 1rem 0 0;
                margin-top: 0.75rem;
                border-top: 1px solid #eee;
                gap: 1rem;
            }

            .nav-drawer.is-open {
                display: flex;
            }

            .nav-primary {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }

            .nav-actions {
                justify-content: flex-start;
                width: 100%;
            }
        }
    </style>
<style id="readera-responsive-patch">
/* ===== RESPONSIVE PATCH ===== */
:root { --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px); }
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
img, video { max-width: 100%; height: auto; }
table { width: 100%; overflow-x: auto; display: block; }
/* Fluid typography */
h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); }
h2 { font-size: clamp(1.25rem, 3vw, 2rem); }
h3 { font-size: clamp(1rem, 2.5vw, 1.5rem); }
p  { font-size: clamp(0.9rem, 1.5vw, 1.05rem); line-height: 1.75; }
/* Input/button touch sizes */
input, textarea, select, button, a.btn { min-height: 44px; }
/* Dark mode form fix */
body.dark-mode input, body.dark input,
body.dark-mode textarea, body.dark textarea,
body.dark-mode select, body.dark select {
    background: #1e2535 !important; color: #e2e8f0 !important;
    border-color: #2d3748 !important;
}
body.dark-mode ::placeholder, body.dark ::placeholder { color: #64748b; }
/* Dark mode card/surface fix */
body.dark-mode .card, body.dark .card,
body.dark-mode .content-card, body.dark .content-card,
body.dark-mode section, body.dark section { background: inherit; }
/* Smooth scroll for anchor links */
html { scroll-behavior: smooth; }
/* Focus visible for accessibility */
:focus-visible { outline: 2px solid var(--primary,#8B4513); outline-offset: 2px; }
/* Better mobile tap targets for nav */
.nav-primary li a { min-height: 44px; display: flex; align-items: center; }
</style>
</head>

<body>

    <nav class="navbar" aria-label="Main">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">ReadEra</a>
            </div>
            <button type="button" class="menu-toggle" id="mobile-menu-btn" aria-expanded="false"
                aria-controls="nav-drawer" aria-label="Open menu">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-drawer" id="nav-drawer">
                <ul class="nav-primary">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="browse.html">Browse</a></li>
                    <li><a href="hindi-books.html">हिंदी Books</a></li>
                    <li id="library-link" style="display: none;"><a href="library.html" aria-current="page">My Library</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button type="button" class="theme-toggle" id="theme-toggle"
                        aria-label="Toggle dark mode">🌙</button>
                    <a href="browse.html" class="btn btn-outline">Explore</a>
                    <a href="auth.html" class="btn btn-ghost" id="auth-link">Log in</a>
                    <a href="#" class="btn btn-outline" id="logout-link" style="display: none;">Log out</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="library-header">
        <h1><i class="fas fa-bookmark"></i> My Library</h1>
        <p>Your personal collection of books. Read, track progress, and discover more.</p>
    </div>

    <div class="library-container">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book"></i></div>
                <div class="stat-value" id="totalBooks">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book-reader"></i></div>
                <div class="stat-value" id="readingCount">0</div>
                <div class="stat-label">Currently Reading</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-value" id="favoriteCount">0</div>
                <div class="stat-label">Favorites</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="library-tabs">
            <button class="tab-btn active" data-tab="all">All Books</button>
            <button class="tab-btn" data-tab="reading">Currently Reading</button>
            <button class="tab-btn" data-tab="completed">Completed</button>
            <button class="tab-btn" data-tab="favorites">Favorites</button>
        </div>

        <!-- Search & Filter -->
        <div class="search-filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchLibrary" placeholder="Search your library...">
            </div>
            <div class="filter-options">
                <select id="genreFilter" class="filter-select">
                    <option value="all">All Genres</option>
                </select>
                <select id="sortBy" class="filter-select">
                    <option value="recent">Recently Added</option>
                    <option value="title">Title A-Z</option>
                    <option value="progress">Progress</option>
                </select>
            </div>
        </div>

        <!-- Books Grid -->
        <div id="booksGrid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading your library...</div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-bottom-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="disclaimer.html">Disclaimer</a>
                <a href="about.html">About</a>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // ── Library reads from localStorage (set by browse.html & book-detail.html) ──
        const booksGridEl = document.getElementById('booksGrid');
        const searchInput = document.getElementById('searchLibrary');
        const genreFilter = document.getElementById('genreFilter');
        const sortBy = document.getElementById('sortBy');
        let libraryBooks = [];
        let currentTab = 'all';

        function escH(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
        function renderStars(r){const f=Math.floor(r||0);let s='';for(let i=0;i<f;i++)s+='★';for(let i=f;i<5;i++)s+='☆';return s;}
        function getCover(b){return `https://archive.org/services/img/${b.identifier||b.id}`;}

        function loadLibrary(){
            try{libraryBooks=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){libraryBooks=[];}
            let prog={};try{prog=JSON.parse(localStorage.getItem('readingProgress')||'{}');}catch(e){}
            libraryBooks.forEach(b=>{ const p=prog[b.id]; if(p){b.progress=p.page&&p.total?Math.round(p.page/p.total*100):0; b.lastPage=p.page; b.totalPages=p.total;} });
            updateStats();
            populateGenres();
            applyAndRender();
        }

        function populateGenres(){
            const genres=[...new Set(libraryBooks.map(b=>b.category||b.genre).filter(Boolean))];
            genreFilter.innerHTML='<option value="all">All Genres</option>'+genres.map(g=>`<option value="${escH(g)}">${escH(g)}</option>`).join('');
        }

        function updateStats(){
            const r=libraryBooks.filter(b=>(b.progress||0)>0&&(b.progress||0)<100).length;
            const c=libraryBooks.filter(b=>(b.progress||0)>=100).length;
            const fav=libraryBooks.filter(b=>b.favorite).length;
            document.getElementById('totalBooks').textContent=libraryBooks.length;
            document.getElementById('readingCount').textContent=r;
            document.getElementById('completedCount').textContent=c;
            document.getElementById('favoriteCount').textContent=fav;
        }

        function applyAndRender(){
            let books=[...libraryBooks];
            const q=searchInput.value.toLowerCase();
            if(q) books=books.filter(b=>b.title?.toLowerCase().includes(q)||b.author?.toLowerCase().includes(q));
            const g=genreFilter.value;
            if(g!=='all') books=books.filter(b=>(b.category||b.genre)===g);
            if(currentTab==='reading') books=books.filter(b=>(b.progress||0)>0&&(b.progress||0)<100);
            else if(currentTab==='completed') books=books.filter(b=>(b.progress||0)>=100);
            else if(currentTab==='favorites') books=books.filter(b=>b.favorite);
            const sv=sortBy.value;
            if(sv==='title') books.sort((a,b)=>a.title?.localeCompare(b.title||'')||0);
            else if(sv==='progress') books.sort((a,b)=>(b.progress||0)-(a.progress||0));
            else books.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
            renderGrid(books);
        }

        function renderGrid(books){
            if(books.length===0){
                booksGridEl.innerHTML=`<div class="empty-state"><i class="fas fa-book-open"></i><h3>No Books Found</h3><p>${currentTab==='all'?'Your library is empty. Start adding books!':'No books in this category.'}</p><a href="browse.html" class="btn btn-solid">Browse Books</a></div>`;
                return;
            }
            booksGridEl.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem">
            ${books.map(book=>{
                const pct=book.progress||0;
                const cover=getCover(book);
                return `<div class="library-book-card" style="flex-direction:column;padding:0;cursor:pointer" onclick="location.href='book-detail.html?id=${book.id}'">
                    <img src="${cover}" alt="${escH(book.title)}" 
                         style="width:100%;height:220px;object-fit:cover;border-radius:12px 12px 0 0"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div style="display:none;width:100%;height:220px;border-radius:12px 12px 0 0;background:linear-gradient(135deg,#1e293b,#334155);align-items:center;justify-content:center;font-size:3rem">📚</div>
                    <div class="book-details" style="padding:0.85rem">
                        <div class="book-title-small">${escH(book.title)}</div>
                        <div class="book-author-small">by ${escH(book.author||'Unknown')}</div>
                        ${book.category?`<span class="book-genre-small">${escH(book.category)}</span>`:''}
                        ${pct>0?`<div class="progress-wrapper"><div class="progress-info"><span>${pct>=100?'✅ Completed':'📖 Reading'}</span><span>${pct}%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div></div>`:''}
                        <div class="book-actions-small" onclick="event.stopPropagation()">
                            <a href="book-detail.html?id=${book.id}" class="action-btn read-btn"><i class="fas fa-book-open"></i> ${pct>0&&pct<100?'Continue':'Read'}</a>
                            <button class="action-btn favorite-btn ${book.favorite?'active':''}" onclick="toggleFav(${book.id})"><i class="fas fa-star"></i></button>
                            <button class="action-btn remove-btn" onclick="removeBook(${book.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('')}
            </div>`;
        }

        window.toggleFav=function(id){
            let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
            const b=lib.find(x=>x.id===id);if(b){b.favorite=!b.favorite;try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}}
            loadLibrary();
        };
        window.removeBook=function(id){
            if(!confirm('Remove from library?'))return;
            let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
            lib=lib.filter(x=>x.id!==id);try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}
            loadLibrary();
        };

        searchInput.addEventListener('input',applyAndRender);
        genreFilter.addEventListener('change',applyAndRender);
        sortBy.addEventListener('change',applyAndRender);
        document.querySelectorAll('.tab-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');currentTab=btn.dataset.tab;applyAndRender();
            });
        });

        // Mobile menu is now handled by ThemeManager in js/theme.js

        loadLibrary();
    </script>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/theme.js"></script>
</body>

</html>
