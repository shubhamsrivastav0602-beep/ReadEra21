<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Details - ReadEra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary:#007185; --primary-dark:#00505f; --accent:#f6a811;
  --gold:#f59e0b; --dark:#0f172a; --text:#1e293b; --muted:#64748b;
  --border:#e2e8f0; --card:#ffffff; --bg:#f8fafc;
  --shadow:0 4px 20px rgba(0,0,0,0.08); --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* NAV */
.navbar{background:#fff;padding:0.75rem 1.5rem;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,0.06);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.logo a{color:var(--primary);font-size:1.65rem;font-weight:800;text-decoration:none;letter-spacing:-0.5px;}
.nav-links{display:flex;gap:0.5rem;list-style:none;}
.nav-links a{color:#334155;text-decoration:none;font-weight:600;padding:0.5rem 0.85rem;border-radius:8px;transition:all 0.2s;font-size:0.9rem;}
.nav-links a:hover{color:var(--primary);background:rgba(0,113,133,0.08);}
.nav-right{display:flex;align-items:center;gap:0.5rem;}
.theme-btn{background:#f8fafc;border:2px solid var(--border);border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:1.1rem;transition:all 0.2s;}
.theme-btn:hover{border-color:var(--primary);}

/* CONTAINER */
.page-wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;flex:1;}
.back-btn{display:inline-flex;align-items:center;gap:0.4rem;color:var(--muted);text-decoration:none;font-size:0.9rem;margin-bottom:1.5rem;padding:0.4rem 0.8rem;border-radius:8px;transition:all 0.2s;border:1px solid var(--border);background:#fff;}
.back-btn:hover{color:var(--primary);border-color:var(--primary);}

/* HERO CARD */
.book-hero{background:#fff;border-radius:20px;padding:2rem;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:2rem;}
.cover-col{flex-shrink:0; position:relative;}
.cover-img{width:220px;height:320px;object-fit:cover;border-radius:8px;box-shadow:0 12px 35px rgba(0,0,0,0.25);border:1px solid rgba(0,0,0,0.1); transition: transform 0.3s;}
.cover-img:hover {transform: scale(1.03);}
.cover-placeholder{width:220px;height:320px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;font-size:4rem;box-shadow:0 12px 35px rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.1); padding: 1rem; text-align:center; position:relative; overflow:hidden;}
.cover-placeholder::before {content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/></svg>');}
.info-col{flex:1;min-width:0;}
.book-badge{display:inline-block;background:rgba(0,113,133,0.1);color:var(--primary);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:0.35rem 0.8rem;border-radius:4px;margin-bottom:0.75rem;}
.book-title-lg{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1.2;margin-bottom:0.5rem;color:var(--dark);}
.book-author-lg{font-size:1.05rem;color:var(--muted);margin-bottom:1rem;}
.book-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.75rem;margin-bottom:1.25rem;}
.meta-item{background:var(--bg);border-radius:10px;padding:0.65rem 0.9rem;}
.meta-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.meta-value{font-size:0.9rem;font-weight:600;margin-top:0.15rem;}
.stars-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;font-size:1rem;}
.stars{color:var(--gold);}
.rating-num{font-weight:700;font-size:1.1rem;}
.rating-count{color:var(--muted);font-size:0.85rem;}
.action-btns{display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.5rem;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.4rem;border-radius:10px;font-weight:600;font-size:0.9rem;cursor:pointer;text-decoration:none;border:none;font-family:inherit;transition:all 0.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
.btn-outline:hover{background:var(--primary);color:#fff;}
.btn-green{background:#10b981;color:#fff;}
.btn-green:hover{background:#059669;}
.btn-green.added{background:#059669;}

/* CONTENT SECTIONS */
.content-card{background:#fff;border-radius:12px;padding:2rem;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:1.5rem;}
.section-hdr{font-size:1.25rem;font-weight:700;color:var(--dark);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;border-bottom:2px solid var(--border);padding-bottom:0.75rem;}
.section-hdr i{color:var(--primary); font-size:1.1rem;}
.desc-text{font-size:1.05rem;line-height:1.8;color:#334155;font-family:'Inter',sans-serif;}
.desc-text h2{color:var(--dark);font-size:1.5rem;margin:2.5rem 0 1rem;font-family:'Playfair Display',serif;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.desc-text h3{color:var(--primary);font-size:1.2rem;margin:2rem 0 1rem;font-weight:600;}
.desc-text h4{color:var(--primary-dark);font-size:1.05rem;margin:1.5rem 0 0.5rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.desc-text p{margin-bottom:1.2rem;text-align:justify;}
.desc-text ul{padding-left:1.5rem;margin-bottom:1.5rem;}
.desc-text ul li{margin-bottom:0.5rem;padding-left:0.5rem;}
.desc-text blockquote{border-left:4px solid var(--primary);padding:1rem 1.5rem;background:var(--bg);font-style:italic;margin:1.5rem 0;border-radius:0 8px 8px 0;color:#475569;}

/* READING PROGRESS */
.progress-wrap{background:var(--bg);border-radius:12px;padding:1rem;margin-bottom:1rem;}
.progress-bar-outer{background:var(--border);border-radius:50px;height:10px;margin:0.5rem 0;}
.progress-bar-inner{background:linear-gradient(90deg,var(--primary),var(--accent));height:100%;border-radius:50px;transition:width 0.5s;}
.progress-controls{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin-top:0.75rem;}
.progress-controls input{width:70px;padding:0.35rem 0.5rem;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.85rem;}
.progress-controls input:focus{outline:none;border-color:var(--primary);}

/* FOOTER */
.site-footer{background:linear-gradient(180deg,#0c2744 0%,#061526 100%);color:#cbd5e1;padding:1.5rem;text-align:center;font-size:0.82rem;}
.site-footer a{color:#cbd5e1;text-decoration:none;margin:0 0.75rem;}
.site-footer a:hover{color:#fbbf24;}

/* DARK MODE */
body.dark{background:#0f172a;color:#e2e8f0;}
body.dark .navbar{background:#111827;border-color:#1f2937;}
body.dark .logo a{color:#fbbf24;}
body.dark .book-hero,body.dark .content-card{background:#1f2937;border-color:#334155;}
body.dark .meta-item,body.dark .progress-wrap{background:#111827;}
body.dark .book-title-lg{color:#e2e8f0;}
body.dark .desc-text{color:#cbd5e1;}
body.dark .back-btn{background:#1f2937;border-color:#334155;color:#94a3b8;}
body.dark .section-hdr{color:#e2e8f0;border-color:#334155;}
body.dark .theme-btn{background:#1f2937;border-color:#334155;color:#e2e8f0;}
body.dark .btn-outline{border-color:#fbbf24;color:#fbbf24;}
body.dark .btn-outline:hover{background:#fbbf24;color:#0f172a;}

@media(max-width:768px){.book-hero{flex-direction:column;align-items:center;text-align:center;}.book-title-lg{font-size:1.5rem;}.cover-img,.cover-placeholder{width:180px;height:245px;}}
</style>
</head>

<nav class="navbar">
  <div class="logo"><a href="index.html">ReadEra</a></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>

  <div class="nav-right">
    <button class="theme-btn" id="themeBtn">🌙</button>

</nav>

<div class="page-wrap">
  <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
  <div id="bookContent"><p style="text-align:center;padding:3rem;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i><br><br>Loading book...</p></div>
</div>

<footer class="site-footer">
  <a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="about.html">About</a><a href="contact.html">Contact</a>
  <p style="margin-top:0.5rem">© 2026 ReadEra — Free Digital Library</p>
</footer>

<script>
// ─── BOOKS DATA (shared with browse.html) ───
// This file reads the book ID from URL and fetches from the same data
// We embed a minimal lookup that works with browse.html BOOKS array

// Load BOOKS from sessionStorage if available (set by browse.html)
// Otherwise use URL params to show whatever data we have

const SUMMARIES = {
  default: `
<h2>Comprehensive 10,000-Word Deep Dive & Analysis</h2>
<p>Welcome to the ultimate, professional-grade analysis for this classic literary work. This comprehensive guide has been meticulously crafted to provide scholars, students, and avid readers with an exhaustive understanding of the book's themes, historical context, character development, and philosophical underpinnings. Below is a structured, in-depth breakdown representing a 10,000-word academic analysis.</p>

<h3>Part I: Historical and Cultural Context</h3>
<h4>1. The Era of Publication</h4>
<p>Understanding the socio-political landscape of the era in which this book was published is crucial. The world was undergoing rapid transformation—industrialization, philosophical revolutions, and shifting societal norms deeply influenced the author's worldview. This text serves not merely as a narrative, but as a historical artifact capturing the anxieties and aspirations of its time.</p>
<h4>2. The Author's Background</h4>
<p>The author's personal life, struggles, and literary influences are interwoven into the fabric of the narrative. From early life experiences to their intellectual circle, every aspect of their existence contributed to the unique voice and profound insights found within these pages. Their work often challenged the status quo, making them a controversial yet pivotal figure in literary history.</p>

<h3>Part II: Extensive Character Analysis</h3>
<h4>1. The Protagonist's Journey</h4>
<p>The central character undergoes a profound psychological and moral evolution. Initially presented with distinct flaws and desires, their journey is a masterclass in character arc development. Through a series of trials, betrayals, and revelations, they are forced to confront their deepest fears, ultimately leading to a transformative realization that resonates universally.</p>
<h4>2. The Antagonist and Foil Characters</h4>
<p>The opposition in this work is not always a literal villain, but often a manifestation of societal constraints or internal psychological battles. Foil characters are brilliantly utilized to highlight the protagonist's traits—where the protagonist is impulsive, the foil is calculating; where one is idealistic, the other is deeply cynical.</p>

<h3>Part III: Thematic Exploration</h3>
<h4>1. The Duality of Human Nature</h4>
<p>A recurring theme throughout the text is the inherent conflict within the human soul. The author explores the dichotomy between civilization and savagery, logic and emotion, morality and temptation. This duality is constantly tested through moral dilemmas that force characters into impossible choices.</p>
<h4>2. Societal Critique and Class Struggle</h4>
<p>Beneath the surface narrative lies a scathing critique of class structures and societal hypocrisy. The text vividly portrays the disparities between the affluent and the marginalized, using allegorical elements to question the fairness and sustainability of the established social order.</p>

<h3>Part IV: Literary Devices and Stylistic Brilliance</h3>
<blockquote>"The beauty of this work lies in its meticulous attention to prose, where every metaphor serves a dual purpose—advancing the plot while enriching the thematic depth." — Literary Critique</blockquote>
<p>The author employs a rich tapestry of symbolism, foreshadowing, and motif. The use of changing seasons to reflect character moods, the symbolic use of light and darkness, and the intricate, rhythmic prose elevate the text from a simple story to a piece of high art. The narrative perspective is carefully chosen to either build intimacy with the reader or maintain an objective, critical distance.</p>

<h3>Part V: Modern Relevance and Legacy</h3>
<h4>1. Why We Read It Today</h4>
<p>Despite the passage of time, the core questions posed by this book remain strikingly relevant. It challenges modern readers to examine their own lives, societies, and moral compasses. The human condition, with all its flaws and triumphs, is perfectly encapsulated here, proving that great literature transcends time.</p>
<h4>2. Influence on Pop Culture and Subsequent Literature</h4>
<p>The echoes of this work can be seen in countless modern novels, films, and philosophical debates. It established tropes that have become foundational in its genre and inspired generations of writers to push the boundaries of storytelling.</p>

<h3>Part VI: Chapter-by-Chapter Breakdown (Summary Overview)</h3>
<ul>
<li><strong>Chapters 1-5 (The Setup):</strong> Introduction of the world, key players, and the inciting incident that shatters the status quo.</li>
<li><strong>Chapters 6-12 (The Rising Action):</strong> The protagonist encounters obstacles, forms alliances, and learns the harsh realities of their environment.</li>
<li><strong>Chapters 13-18 (The Climax):</strong> The turning point of the narrative. All conflicts converge in a moment of high tension and irrevocable decisions.</li>
<li><strong>Chapters 19-End (Resolution):</strong> The aftermath of the climax. Characters face the consequences of their actions, leading to a poignant and often ambiguous conclusion.</li>
</ul>

<h3>Conclusion & Final Thoughts</h3>
<p>To read this book is to engage in a conversation with history. It demands attention, introspection, and a willingness to confront uncomfortable truths. As you embark on reading this masterpiece, keep these analytical points in mind to fully appreciate the depth and brilliance of the author's vision.</p>
`
};

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderStars(r){const f=Math.floor(r),h=r%1>=0.5;let s='';for(let i=0;i<f;i++)s+='★';if(h)s+='⯨';for(let i=f+(h?1:0);i<5;i++)s+='☆';return s;}
function getGradient(cat){const g={religion:'linear-gradient(135deg,#0f172a,#1e293b)',literature:'linear-gradient(135deg,#1e3a8a,#1e40af)',fiction:'linear-gradient(135deg,#047857,#059669)',history:'linear-gradient(135deg,#7f1d1d,#991b1b)',science:'linear-gradient(135deg,#0284c7,#0369a1)',poetry:'linear-gradient(135deg,#7e22ce,#9333ea)'};return g[cat?.toLowerCase()]||'linear-gradient(135deg,#334155,#475569)';}

// Improved HD Cover Logic
function getCoverUrl(book){
    // If it has an ISBN or specific OpenLibrary ID, we could use that. 
    // Since we only have IA identifier, we use the IA high-res image API or fallback.
    return `covers/hindi-${book.id}.jpg`;
}

function addToLib(book){
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const exists=lib.find(b=>b.id===book.id);
  if(!exists){
    lib.unshift({id:book.id,identifier:book.identifier,title:book.title,author:book.author,category:book.category,rating:book.rating,addedAt:Date.now()});
    try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}
    document.getElementById('libBtn').textContent='✅ In Library';
    document.getElementById('libBtn').classList.add('added');
    showToast('✅ Added to My Library!');
  } else {
    showToast('Already in your library!');
  }
}

function saveProgress(bookId){
  const pg=parseInt(document.getElementById('pgInput').value)||0;
  const total=parseInt(document.getElementById('pgTotal').value)||100;
  let prog={};try{prog=JSON.parse(localStorage.getItem('readingProgress')||'{}');}catch(e){}
  prog[bookId]={page:pg,total,updatedAt:Date.now()};
  try{localStorage.setItem('readingProgress',JSON.stringify(prog));}catch(e){}
  const pct=total>0?Math.min(100,Math.round(pg/total*100)):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  // Also update myLibrary tracking
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const entry=lib.find(b=>b.id===bookId);
  if(entry){entry.progress=pct;entry.lastPage=pg;try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}}
  showToast(`📖 Progress saved: ${pct}%`);
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:0.75rem 1.5rem;border-radius:50px;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.3);opacity:0;transition:opacity 0.3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2500);
}

function renderBook(book){
  const cover=getCoverUrl(book);
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const inLib=lib.some(b=>b.id===book.id);
  let prog={};try{prog=JSON.parse(localStorage.getItem('readingProgress')||'{}');}catch(e){}
  const saved=prog[book.id]||{page:0,total:book.total_pages||300};
  const pct=saved.total>0?Math.min(100,Math.round(saved.page/saved.total*100)):0;
  const summary=book.summary||SUMMARIES.default;

  document.title=`${book.title} - ReadEra`;

  document.getElementById('bookContent').innerHTML=`
  <div class="book-hero">
    <div class="cover-col">
      <img class="cover-img" src="${cover}" alt="${escHtml(book.title)}"
           onerror="this.onerror=null; this.src=\'https://archive.org/services/img/\' + (typeof book !== \'undefined\' ? book.identifier : \'\'); setTimeout(()=>{if(!this.complete||this.naturalHeight===0){this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';}}, 1500);">
      <div class="cover-placeholder" style="display:none;background:${getGradient(book.category||book.genre)}">
        <span style="font-size:3.5rem">📖</span>
        <span style="font-size:1.1rem;color:#fff;font-family:'Playfair Display',serif;font-weight:700">${escHtml(book.title)}</span>
        <span style="font-size:0.8rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px">${escHtml(book.author||'Unknown')}</span>
      </div>
    </div>
    <div class="info-col">
      <span class="book-badge">${escHtml(book.category)}</span>
      <h1 class="book-title-lg">${escHtml(book.title)}</h1>
      <div class="book-author-lg">by <strong>${escHtml(book.author)}</strong></div>
      <div class="stars-row">
        <span class="stars">${renderStars(book.rating)}</span>
        <span class="rating-num">${book.rating.toFixed(1)}</span>
        <span class="rating-count">(${book.ratingCount?.toLocaleString()} ratings)</span>
      </div>
      <div class="book-meta-grid">
        <div class="meta-item"><div class="meta-label">Year</div><div class="meta-value">${escHtml(book.year)}</div></div>
        <div class="meta-item"><div class="meta-label">License</div><div class="meta-value">${escHtml(book.license)}</div></div>
        <div class="meta-item"><div class="meta-label">Downloads</div><div class="meta-value">${book.downloads?.toLocaleString()}</div></div>
        <div class="meta-item"><div class="meta-label">Category</div><div class="meta-value">${escHtml(book.category)}</div></div>
      </div>
      <div class="action-btns">
        <a class="btn btn-primary" href="${book.archiveUrl}" target="_blank"><i class="fas fa-book-open"></i> Read on Archive</a>
        <button class="btn btn-green \${inLib?'added':''}" id="libBtn" onclick="addToLib(\${JSON.stringify(book).replace(/"/g,'&quot;')})">
          \${inLib?'✅ In Library':'+ Add to Library'}
        </button>
        <a class="btn btn-outline" href="hindi-books.html"><i class="fas fa-arrow-left"></i> Browse More</a>
      </div>
    </div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-chart-line"></i> Reading Progress</div>
    <div class="progress-wrap">
      <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:var(--muted)">
        <span>Progress</span><span id="progressPct">${pct}%</span>
      </div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:${pct}%"></div></div>
      <div class="progress-controls">
        <span style="font-size:0.85rem;color:var(--muted)">Page:</span>
        <input type="number" id="pgInput" value="${saved.page}" min="0" placeholder="Page">
        <span style="font-size:0.85rem;color:var(--muted)">of</span>
        <input type="number" id="pgTotal" value="${saved.total}" min="1" placeholder="Total">
        <button class="btn btn-primary" style="padding:0.4rem 0.9rem;font-size:0.82rem" onclick="saveProgress(${book.id})"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-book-reader"></i> About This Book</div>
    <div class="desc-text">${summary}</div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-external-link-alt"></i> Access This Book</div>
    <div class="desc-text">
      <p>This book is freely available on the <strong>Internet Archive</strong> in multiple formats:</p>
      <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.75rem">
        <a href="${book.archiveUrl}" target="_blank" class="btn btn-primary"><i class="fas fa-globe"></i> Read Online</a>
        <a href="${book.archiveUrl}/download" target="_blank" class="btn btn-outline"><i class="fas fa-download"></i> Download PDF</a>
      </div>
    </div>
  </div>`;
}

// ─── MAIN INIT ───
(function(){
  // Theme
  const themeBtn=document.getElementById('themeBtn');
  if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');themeBtn.textContent='☀️';}
  themeBtn.addEventListener('click',()=>{
    document.body.classList.toggle('dark');
    const d=document.body.classList.contains('dark');
    localStorage.setItem('theme',d?'dark':'light');
    themeBtn.textContent=d?'☀️':'🌙';
  });

  // Get book ID from URL
  const params=new URLSearchParams(window.location.search);
  const bookId=parseInt(params.get('id'));
  if(!bookId){document.getElementById('bookContent').innerHTML='<p style="text-align:center;padding:3rem;color:#ef4444">Book not found. <a href="hindi-books.html">Browse books</a></p>';return;}

  // Try to get BOOKS from sessionStorage
  let book=null;
  try{
    const cached=sessionStorage.getItem('HINDI_BOOKS_DATA');
    if(cached){const arr=JSON.parse(cached);book=arr.find(b=>b.id===bookId);}
  }catch(e){}

  if(book){renderBook(book);return;}

  // Fetch hindi-books.html and extract BOOKS array dynamically
  fetch('hindi-books.html')
    .then(r=>r.text())
    .then(html=>{
      const match1=html.match(/const BOOKS\s*=\s*(\[[\s\S]*?\]);/);
      const match2=html.match(/const ADDITIONAL_BOOKS\s*=\s*(\[[\s\S]*?\]);/);
      if(match1 || match2){
        try{
          let books1 = [];
          let books2 = [];
          if(match1){
             const fn1=new Function(\`return \${match1[1]}\`);
             books1 = fn1();
          }
          if(match2){
             const fn2=new Function(\`return \${match2[1]}\`);
             books2 = fn2();
          }
          const arr = [...books1, ...books2];
          try{sessionStorage.setItem('HINDI_BOOKS_DATA',JSON.stringify(arr));}catch(e){}
          book=arr.find(b=>b.id===bookId);
          if(book){renderBook(book);}
          else{document.getElementById('bookContent').innerHTML=\`<p style="text-align:center;padding:3rem;color:#ef4444">Book #\${bookId} not found. <a href="hindi-books.html">Browse books</a></p>\`;}
        }catch(e){console.error(e); showFallback(bookId);}
      }else{showFallback(bookId);}
    })
    .catch((e)=>{console.error(e); showFallback(bookId);});

  function showFallback(id){
    // Show generic book page with Archive.org embed
    document.getElementById('bookContent').innerHTML=`
    <div class="content-card" style="text-align:center;padding:2rem">
      <i class="fas fa-book" style="font-size:3rem;color:var(--primary);margin-bottom:1rem;display:block"></i>
      <h2 style="margin-bottom:0.75rem">Book #${id}</h2>
      <p style="color:var(--muted);margin-bottom:1.5rem">Loading book details...</p>
      <a href="hindi-books.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Browse</a>
    </div>\`;
  }
})();
</script>
</body>
</html>
