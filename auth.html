<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sign Up - ReadEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ========== AUTH CONTAINER ========== */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 1.25rem;
            font-size: 1rem;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            background: var(--primary-light);
        }

        .tab-btn:hover:not(.active) {
            color: var(--primary);
            background: var(--bg);
        }

        .auth-form {
            padding: 2.3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
        }

        .submit-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ========== FOOTER ========== */
        .site-footer {
            background: linear-gradient(180deg, #0c2744 0%, #061526 100%);
            color: #cbd5e1;
            margin-top: auto;
            padding: 2rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer-bottom-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.35rem 1rem;
            margin-bottom: 0.65rem;
        }

        .footer-bottom-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.82rem;
        }

        .footer-bottom-links a:hover {
            color: #fbbf24;
            text-decoration: underline;
        }


        /* ========== MOBILE ========== */
        @media (max-width: 768px) {
            .auth-card {
                margin: 0 1rem;
            }

            .auth-form {
                padding: 1.5rem;
            }

            .menu-toggle {
                display: inline-flex;
            }

            .nav-drawer {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                padding: 1rem 0 0;
                margin-top: 0.75rem;
                border-top: 1px solid #eee;
                gap: 1rem;
            }

            .nav-drawer.is-open {
                display: flex;
            }

            .nav-primary {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }

            .nav-actions {
                justify-content: flex-start;
                width: 100%;
            }
        }
    </style>
<style id="readera-responsive-patch">
/* ===== RESPONSIVE PATCH ===== */
:root { --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px); }
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
img, video { max-width: 100%; height: auto; }
table { width: 100%; overflow-x: auto; display: block; }
/* Fluid typography */
h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); }
h2 { font-size: clamp(1.25rem, 3vw, 2rem); }
h3 { font-size: clamp(1rem, 2.5vw, 1.5rem); }
p  { font-size: clamp(0.9rem, 1.5vw, 1.05rem); line-height: 1.75; }
/* Input/button touch sizes */
input, textarea, select, button, a.btn { min-height: 44px; }
/* Dark mode form fix */
body.dark-mode input, body.dark input,
body.dark-mode textarea, body.dark textarea,
body.dark-mode select, body.dark select {
    background: #1e2535 !important; color: #e2e8f0 !important;
    border-color: #2d3748 !important;
}
body.dark-mode ::placeholder, body.dark ::placeholder { color: #64748b; }
/* Dark mode card/surface fix */
body.dark-mode .card, body.dark .card,
body.dark-mode .content-card, body.dark .content-card,
body.dark-mode section, body.dark section { background: inherit; }
/* Smooth scroll for anchor links */
html { scroll-behavior: smooth; }
/* Focus visible for accessibility */
:focus-visible { outline: 2px solid var(--primary,#8B4513); outline-offset: 2px; }
/* Better mobile tap targets for nav */
.nav-primary li a { min-height: 44px; display: flex; align-items: center; }
</style>
</head>

<body>

    <nav class="navbar" aria-label="Main">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">ReadEra</a>
            </div>
            <button type="button" class="menu-toggle" id="mobile-menu-btn" aria-expanded="false"
                aria-controls="nav-drawer" aria-label="Open menu">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-drawer" id="nav-drawer">
                <ul class="nav-primary">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="browse.html">Browse</a></li>
                    <li><a href="hindi-books.html">हिंदी Books</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button type="button" class="theme-toggle" id="theme-toggle"
                        aria-label="Toggle dark mode">🌙</button>
                    <a href="browse.html" class="btn btn-outline">Explore</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="auth-form">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                        <div class="error-message" id="loginEmailError"></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <div class="error-message" id="loginPasswordError"></div>
                    </div>
                    <button type="submit" class="submit-btn" id="loginSubmitBtn">Login</button>
                </form>
                <div class="auth-footer">
                    New to ReadEra? <a href="#" id="switchToSignup">Create an account</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="auth-form" style="display: none;">
                <form id="signupForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                        <div class="error-message" id="signupNameError"></div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                        <div class="error-message" id="signupEmailError"></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="•••••••• (min. 6 characters)" required>
                        <div class="error-message" id="signupPasswordError"></div>
                    </div>
                    <button type="submit" class="submit-btn" id="signupSubmitBtn">Create Account</button>
                </form>
                <div class="auth-footer">
                    Already have an account? <a href="#" id="switchToLogin">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-bottom-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="disclaimer.html">Disclaimer</a>
                <a href="about.html">About</a>
            </div>
            <p>&copy; 2026 ReadEra. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/theme.js"></script>

    <script>
        // ============================================
        // AUTH PAGE LOGIC
        // ============================================

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginDiv = document.getElementById('login-form');
        const signupDiv = document.getElementById('signup-form');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const switchToSignup = document.getElementById('switchToSignup');
        const switchToLogin = document.getElementById('switchToLogin');

        // Switch to Login tab
        function showLogin() {
            loginDiv.style.display = 'block';
            signupDiv.style.display = 'none';
            tabBtns.forEach(btn => {
                if (btn.dataset.tab === 'login') {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Switch to Signup tab
        function showSignup() {
            loginDiv.style.display = 'none';
            signupDiv.style.display = 'block';
            tabBtns.forEach(btn => {
                if (btn.dataset.tab === 'signup') {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Show toast message
        function showToast(msg, type = 'success') {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);color:#fff;padding:0.75rem 1.5rem;border-radius:50px;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.3);opacity:0;transition:opacity 0.3s';
                document.body.appendChild(t);
            }
            t.style.background = type === 'success' ? '#10b981' : '#ef4444';
            t.textContent = msg;
            t.style.opacity = '1';
            setTimeout(() => { t.style.opacity = '0'; }, 2500);
        }

        // Clear all error messages
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('input').forEach(el => {
                el.classList.remove('error');
            });
        }

        // Show error for specific field
        function showError(fieldId, message) {
            const errorEl = document.getElementById(fieldId);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
            const inputEl = document.getElementById(fieldId.replace('Error', ''));
            if (inputEl) {
                inputEl.classList.add('error');
            }
        }

        // Validate email
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Handle Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            let hasError = false;

            if (!email) {
                showError('loginEmailError', 'Email is required');
                hasError = true;
            } else if (!isValidEmail(email)) {
                showError('loginEmailError', 'Enter a valid email address');
                hasError = true;
            }

            if (!password) {
                showError('loginPasswordError', 'Password is required');
                hasError = true;
            }

            if (hasError) return;

            const submitBtn = document.getElementById('loginSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            const result = await AuthService.signIn(email, password);

            if (result.success) {
                // Success - redirect handled in AuthService
                console.log('Login successful');
            } else {
                showError('loginEmailError', result.error || 'Login failed. Please check your credentials.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });

        // Handle Signup
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const fullName = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            let hasError = false;

            if (!fullName) {
                showError('signupNameError', 'Full name is required');
                hasError = true;
            } else if (fullName.length < 2) {
                showError('signupNameError', 'Name must be at least 2 characters');
                hasError = true;
            }

            if (!email) {
                showError('signupEmailError', 'Email is required');
                hasError = true;
            } else if (!isValidEmail(email)) {
                showError('signupEmailError', 'Enter a valid email address');
                hasError = true;
            }

            if (!password) {
                showError('signupPasswordError', 'Password is required');
                hasError = true;
            } else if (password.length < 6) {
                showError('signupPasswordError', 'Password must be at least 6 characters');
                hasError = true;
            }

            if (hasError) return;

            const submitBtn = document.getElementById('signupSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            const result = await AuthService.signUp(email, password, fullName);

            if (result.success) {
                // Show success message and switch to login
                showToast('Account created! Please check your email to verify.', 'success');
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginEmail').value = email;
                }, 1500);
            } else {
                showError('signupEmailError', result.error || 'Signup failed. Email might already be in use.');
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
        });

        // Tab switching
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.tab === 'login') {
                    showLogin();
                } else {
                    showSignup();
                }
            });
        });

        switchToSignup.addEventListener('click', (e) => {
            e.preventDefault();
            showSignup();
        });

        switchToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            showLogin();
        });

        // Check if already logged in, redirect to home
        AuthService.isAuthenticated().then(isAuth => {
            if (isAuth) window.location.href = 'index.html';
        });

        // Mobile menu toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navDrawer = document.getElementById('nav-drawer');
        if (menuBtn && navDrawer) {
            menuBtn.addEventListener('click', () => {
                navDrawer.classList.toggle('is-open');
            });
        }
    </script>
</body>

</html>
