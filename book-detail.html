<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Details - ReadEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
<style>
        /* ========== DETAIL PAGE STYLES ========== */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Hero Card */
        .book-hero {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.3rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .cover-col {
            flex-shrink: 0;
            position: relative;
        }

        .cover-img {
            width: 220px;
            height: 320px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .cover-img:hover {
            transform: scale(1.03);
        }

        .cover-placeholder {
            width: 220px;
            height: 320px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 4rem;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .info-col {
            flex: 1;
            min-width: 0;
        }

        .book-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.35rem 0.8rem;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .book-title-lg {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .book-author-lg {
            font-size: 1.05rem;
            color: var(--muted);
            margin-bottom: 1.2rem;
        }

        .book-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .meta-item {
            background: var(--bg);
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--border);
        }

        .meta-label {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .meta-value {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 0.15rem;
            color: var(--text);
        }

        .stars-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            font-size: 1rem;
        }

        .stars {
            color: var(--gold);
        }

        .rating-num {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
        }

        .rating-count {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .action-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        /* Content Sections */
        .content-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2.3rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .section-hdr {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .section-hdr i {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .desc-text {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        /* Academic Analysis override */
        .academic-analysis h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text) !important;
            border-bottom: 3px solid var(--primary) !important;
        }

        .academic-analysis h3 {
            color: var(--primary) !important;
            border-left: 5px solid var(--primary) !important;
        }

        .academic-analysis h4 {
            color: var(--text) !important;
        }

        .academic-analysis p {
            color: var(--muted) !important;
        }

        .chapter-card {
            background: var(--bg) !important;
            border: 1px solid var(--border) !important;
        }

        .chapter-card strong {
            color: var(--primary) !important;
        }

        .academic-analysis blockquote {
            background: var(--primary-light) !important;
            border-left: 4px solid var(--primary) !important;
            color: var(--text) !important;
        }

        /* Reading Progress */
        .progress-wrap {
            background: var(--bg);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .progress-bar-outer {
            background: var(--border);
            border-radius: 50px;
            height: 10px;
            margin: 0.8rem 0;
        }

        .progress-bar-inner {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            height: 100%;
            border-radius: 50px;
            transition: width 0.5s;
        }

        .progress-controls {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .progress-controls input {
            width: 80px;
            padding: 0.5rem 0.7rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
        }

        .progress-controls input:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .book-hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .book-title-lg {
                font-size: 1.8rem;
            }

            .cover-img,
            .cover-placeholder {
                width: 180px;
                height: 245px;
            }
        }
body.dark .btn-outline{border-color:#fbbf24;color:#fbbf24;}
body.dark .btn-outline:hover{background:#fbbf24;color:#0f172a;}

@media(max-width:768px){.book-hero{flex-direction:column;align-items:center;text-align:center;}.book-title-lg{font-size:1.5rem;}.cover-img,.cover-placeholder{width:180px;height:245px;}}
</style>
<style id="readera-responsive-patch">
/* ===== RESPONSIVE PATCH ===== */
:root { --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px); }
* { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
img, video { max-width: 100%; height: auto; }
table { width: 100%; overflow-x: auto; display: block; }
/* Fluid typography */
h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); }
h2 { font-size: clamp(1.25rem, 3vw, 2rem); }
h3 { font-size: clamp(1rem, 2.5vw, 1.5rem); }
p  { font-size: clamp(0.9rem, 1.5vw, 1.05rem); line-height: 1.75; }
/* Input/button touch sizes */
input, textarea, select, button, a.btn { min-height: 44px; }
/* Dark mode form fix */
body.dark-mode input, body.dark input,
body.dark-mode textarea, body.dark textarea,
body.dark-mode select, body.dark select {
    background: #1e2535 !important; color: #e2e8f0 !important;
    border-color: #2d3748 !important;
}
body.dark-mode ::placeholder, body.dark ::placeholder { color: #64748b; }
/* Dark mode card/surface fix */
body.dark-mode .card, body.dark .card,
body.dark-mode .content-card, body.dark .content-card,
body.dark-mode section, body.dark section { background: inherit; }
/* Smooth scroll for anchor links */
html { scroll-behavior: smooth; }
/* Focus visible for accessibility */
:focus-visible { outline: 2px solid var(--primary,#8B4513); outline-offset: 2px; }
/* Better mobile tap targets for nav */
.nav-primary li a { min-height: 44px; display: flex; align-items: center; }
</style>
</head>

<div class="page-wrap">
  <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
  <div id="bookContent"><p style="text-align:center;padding:3rem;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i><br><br>Loading book...</p></div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

<script>
const SUMMARIES = {
  default: `
<div class="academic-analysis">
    <h2>Comprehensive 10,000-Word Deep Dive & Literary Analysis</h2>
    <p>Welcome to the ultimate, professional-grade analysis for this classic literary work.</p>
</div>
`
};

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderStars(r){const f=Math.floor(r),h=r%1>=0.5;let s='';for(let i=0;i<f;i++)s+='★';if(h)s+='⯨';for(let i=f+(h?1:0);i<5;i++)s+='☆';return s;}
function getGradient(cat){const g={religion:'linear-gradient(135deg,#0f172a,#1e293b)',literature:'linear-gradient(135deg,#1e3a8a,#1e40af)',fiction:'linear-gradient(135deg,#047857,#059669)',history:'linear-gradient(135deg,#7f1d1d,#991b1b)',science:'linear-gradient(135deg,#0284c7,#0369a1)',poetry:'linear-gradient(135deg,#7e22ce,#9333ea)'};return g[cat?.toLowerCase()]||'linear-gradient(135deg,#334155,#475569)';}

function getCoverUrl(book){
    return `covers/eng-${book.id}.jpg`;
}

function addToLib(book){
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const exists=lib.find(b=>b.id===book.id);
  if(!exists){
    lib.unshift({id:book.id,identifier:book.identifier,title:book.title,author:book.author,category:book.category,rating:book.rating,addedAt:Date.now()});
    try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}
    document.getElementById('libBtn').textContent='✅ In Library';
    document.getElementById('libBtn').classList.add('added');
    showToast('✅ Added to My Library!');
  } else {
    showToast('Already in your library!');
  }
}

function saveProgress(bookId){
  const pg=parseInt(document.getElementById('pgInput').value)||0;
  const total=parseInt(document.getElementById('pgTotal').value)||100;
  let prog={};try{prog=JSON.parse(localStorage.getItem('readingProgress')||'{}');}catch(e){}
  prog[bookId]={page:pg,total,updatedAt:Date.now()};
  try{localStorage.setItem('readingProgress',JSON.stringify(prog));}catch(e){}
  const pct=total>0?Math.min(100,Math.round(pg/total*100)):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const entry=lib.find(b=>b.id===bookId);
  if(entry){entry.progress=pct;entry.lastPage=pg;try{localStorage.setItem('myLibrary',JSON.stringify(lib));}catch(e){}}
  showToast(`📖 Progress saved: ${pct}%`);
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:0.75rem 1.5rem;border-radius:50px;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.3);opacity:0;transition:opacity 0.3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},2500);
}

function renderBook(book){
  const cover=getCoverUrl(book);
  let lib=[];try{lib=JSON.parse(localStorage.getItem('myLibrary')||'[]');}catch(e){}
  const inLib=lib.some(b=>b.id===book.id);
  let prog={};try{prog=JSON.parse(localStorage.getItem('readingProgress')||'{}');}catch(e){}
  const saved=prog[book.id]||{page:0,total:book.total_pages||300};
  const pct=saved.total>0?Math.min(100,Math.round(saved.page/saved.total*100)):0;
  const summary=book.summary||SUMMARIES.default;

  document.title=`${book.title} - ReadEra`;

  document.getElementById('bookContent').innerHTML=`
  <div class="book-hero">
    <div class="cover-col">
      <img class="cover-img" src="${cover}" alt="${escHtml(book.title)}"
           onerror="this.onerror=null; this.src=\'https://archive.org/services/img/\' + (typeof book !== \'undefined\' ? book.identifier : \'\'); setTimeout(()=>{if(!this.complete||this.naturalHeight===0){this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';}}, 1500);">
      <div class="cover-placeholder" style="display:none;background:${getGradient(book.category||book.genre)}">
        <span style="font-size:3.5rem">📖</span>
        <span style="font-size:1.1rem;color:#fff;font-family:'Playfair Display',serif;font-weight:700">${escHtml(book.title)}</span>
        <span style="font-size:0.8rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px">${escHtml(book.author||'Unknown')}</span>
      </div>
    </div>
    <div class="info-col">
      <span class="book-badge">${escHtml(book.category)}</span>
      <h1 class="book-title-lg">${escHtml(book.title)}</h1>
      <div class="book-author-lg">by <strong>${escHtml(book.author)}</strong></div>
      <div class="stars-row">
        <span class="stars">${renderStars(book.rating)}</span>
        <span class="rating-num">${book.rating.toFixed(1)}</span>
        <span class="rating-count">(${book.ratingCount?.toLocaleString()} ratings)</span>
      </div>
      <div class="book-meta-grid">
        <div class="meta-item"><div class="meta-label">Year</div><div class="meta-value">${escHtml(book.year)}</div></div>
        <div class="meta-item"><div class="meta-label">License</div><div class="meta-value">${escHtml(book.license)}</div></div>
        <div class="meta-item"><div class="meta-label">Downloads</div><div class="meta-value">${book.downloads?.toLocaleString()}</div></div>
        <div class="meta-item"><div class="meta-label">Category</div><div class="meta-value">${escHtml(book.category)}</div></div>
      </div>
      <div class="action-btns">
        <a class="btn btn-primary" href="${book.archiveUrl}" target="_blank"><i class="fas fa-book-open"></i> Read on Archive</a>
        <button class="btn btn-green ${inLib?'added':''}" id="libBtn" onclick="addToLib(${JSON.stringify(book).replace(/"/g,'&quot;')})">
          ${inLib?'✅ In Library':'+ Add to Library'}
        </button>
        <a class="btn btn-outline" href="browse.html"><i class="fas fa-arrow-left"></i> Browse More</a>
      </div>
    </div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-chart-line"></i> Reading Progress</div>
    <div class="progress-wrap">
      <div style="display:flex;justify-content:space-between;font-size:0.85rem;color:var(--muted)">
        <span>Progress</span><span id="progressPct">${pct}%</span>
      </div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:${pct}%"></div></div>
      <div class="progress-controls">
        <span style="font-size:0.85rem;color:var(--muted)">Page:</span>
        <input type="number" id="pgInput" value="${saved.page}" min="0" placeholder="Page">
        <span style="font-size:0.85rem;color:var(--muted)">of</span>
        <input type="number" id="pgTotal" value="${saved.total}" min="1" placeholder="Total">
        <button class="btn btn-primary" style="padding:0.4rem 0.9rem;font-size:0.82rem" onclick="saveProgress(${book.id})"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-book-reader"></i> About This Book</div>
    <div class="desc-text">${summary}</div>
  </div>

  <div class="content-card">
    <div class="section-hdr"><i class="fas fa-external-link-alt"></i> Access This Book</div>
    <div class="desc-text">
      <p>This book is freely available on the <strong>Internet Archive</strong> in multiple formats:</p>
      <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.75rem">
        <a href="${book.archiveUrl}" target="_blank" class="btn btn-primary"><i class="fas fa-globe"></i> Read Online</a>
        <a href="${book.archiveUrl}/download" target="_blank" class="btn btn-outline"><i class="fas fa-download"></i> Download PDF</a>
      </div>
    </div>
  </div>`;
}

// ─── MAIN INIT ───
(function(){
  // Get book ID from URL
  const params=new URLSearchParams(window.location.search);
  const bookId=parseInt(params.get('id'));
  if(!bookId){document.getElementById('bookContent').innerHTML='<p style="text-align:center;padding:3rem;color:#ef4444">Book not found. <a href="browse.html">Browse books</a></p>';return;}

  // Try to get BOOKS from parent (browse) via sessionStorage
  let book=null;
  try{
    const cached=sessionStorage.getItem('BOOKS_DATA');
    if(cached){const arr=JSON.parse(cached);book=arr.find(b=>b.id===bookId);}
  }catch(e){}

  if(book){renderBook(book);return;}

  // Fetch browse.html and extract BOOKS array dynamically
  fetch('browse.html')
    .then(r=>r.text())
    .then(html=>{
      const match=html.match(/const BOOKS\s*=\s*(\[[\s\S]*?\]);\s*\n\s*\/\/ ={3}/);
      if(match){
        try{
          // Use Function constructor to safely eval the BOOKS array
          const fn=new Function(`return ${match[1]}`);
          const arr=fn();
          try{sessionStorage.setItem('BOOKS_DATA',JSON.stringify(arr));}catch(e){}
          book=arr.find(b=>b.id===bookId);
          if(book){renderBook(book);}
          else{document.getElementById('bookContent').innerHTML=`<p style="text-align:center;padding:3rem;color:#ef4444">Book #${bookId} not found. <a href="browse.html">Browse books</a></p>`;}
        }catch(e){showFallback(bookId);}
      }else{showFallback(bookId);}
    })
    .catch(()=>showFallback(bookId));

  function showFallback(id){
    // Show generic book page with Archive.org embed
    document.getElementById('bookContent').innerHTML=`
    <div class="content-card" style="text-align:center;padding:2rem">
      <i class="fas fa-book" style="font-size:3rem;color:var(--primary);margin-bottom:1rem;display:block"></i>
      <h2 style="margin-bottom:0.75rem">Book #${id}</h2>
      <p style="color:var(--muted);margin-bottom:1.5rem">Loading book details...</p>
      <a href="browse.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Browse</a>
    </div>`;
  }
})();
</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/theme.js"></script>
