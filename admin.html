<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ReadEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
        }

        .admin-header {
            background: linear-gradient(135deg, #8B4513, #c17a3a);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.25rem;
            border-radius: 16px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #8B4513;
        }

        .stat-card .label {
            color: #64748b;
            font-size: 0.85rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .login-box {
            max-width: 400px;
            margin: 4rem auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }

        .login-box button {
            width: 100%;
            padding: 0.75rem;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 12px;
            margin-top: 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.6rem 1.25rem;
            background: none;
            border: none;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 10px;
        }

        .tab-btn.active {
            background: #8B4513;
            color: white;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .submit-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .books-table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
        }

        .books-table {
            width: 100%;
            border-collapse: collapse;
        }

        .books-table th,
        .books-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eef2f7;
        }

        .books-table th {
            background: #f8fafc;
        }

        .action-btn {
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 0 2px;
        }

        .edit-btn {
            background: #3b82f6;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        body.dark-mode {
            background: #0f172a;
        }

        body.dark-mode .stat-card,
        body.dark-mode .form-card,
        body.dark-mode .books-table-container,
        body.dark-mode .login-box {
            background: #1f2937;
            color: #e2e8f0;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 12px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> ReadEra Admin Panel</h1>
        <div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <button class="theme-toggle" id="logoutBtn" style="margin-left: 0.5rem;"><i
                    class="fas fa-sign-out-alt"></i></button>
            <a href="index.html" class="theme-toggle"
                style="margin-left: 0.5rem; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">🏠</a>
        </div>
    </div>

    <div class="container" id="appContainer">
        <!-- LOGIN BOX -->
        <div id="loginBox">
            <div class="login-box">
                <i class="fas fa-shield-alt" style="font-size: 3rem; color: #8B4513; margin-bottom: 1rem;"></i>
                <h2>Admin Login</h2>
                <input type="text" id="adminUser" placeholder="Username" value="readera_admin">
                <input type="password" id="adminPass" placeholder="Password" value="ReadEra@2026">
                <button id="doLogin"><i class="fas fa-sign-in-alt"></i> Login</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="books">📚 Books</button>
                <button class="tab-btn" data-tab="add">➕ Add Book</button>
                <button class="tab-btn" data-tab="bulk">📤 Bulk Upload</button>
            </div>

            <div id="booksTab">
                <div class="books-table-container">
                    <table class="books-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Genre</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="booksList">
                            <tr>
                                <td colspan="5">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="addTab" style="display: none;">
                <div class="form-card">
                    <h3>Add New Book</h3>
                    <form id="addForm">
                        <div class="form-row">
                            <div class="form-group"><label>Title</label><input type="text" id="addTitle" required></div>
                            <div class="form-group"><label>Author</label><input type="text" id="addAuthor" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Genre</label><input type="text" id="addGenre"
                                    placeholder="Fiction, Mystery, etc."></div>
                            <div class="form-group"><label>Year</label><input type="number" id="addYear"></div>
                        </div>
                        <div class="form-group"><label>Summary</label><textarea id="addSummary" rows="4"></textarea>
                        </div>
                        <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Add Book</button>
                    </form>
                </div>
            </div>

            <div id="bulkTab" style="display: none;">
                <div class="form-card">
                    <h3>Bulk Upload JSON</h3>
                    <textarea id="bulkJson" rows="10" style="width:100%; font-family:monospace;"
                        placeholder='[{"title":"Book Title","author":"Author","genre":"Fiction","summary":"Description","year":2024}]'></textarea>
                    <button id="bulkUpload" class="submit-btn" style="margin-top: 1rem;"><i class="fas fa-upload"></i>
                        Upload All</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIG
        const SUPABASE_URL = "https://ryzbikpzxphrsdctvqp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MPqGLh4Z15HdLuTRQ81SzA_Ssm9n";
        const supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_USER = "readera_admin";
        const ADMIN_PASS = "ReadEra@2026";

        let allBooks = [];

        // LOGIN
        document.getElementById('doLogin')?.addEventListener('click', () => {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                localStorage.setItem('admin_auth', 'true');
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                showMsg('Login successful!', 'success');
            } else {
                showMsg('Wrong credentials!', 'error');
            }
        });

        // LOGOUT
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('admin_auth');
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        });

        // CHECK SESSION
        if (localStorage.getItem('admin_auth') === 'true') {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        }

        async function loadData() {
            await loadBooks();
            await loadStats();
        }

        async function loadBooks() {
            const { data, error } = await supabase.from('books').select('*').order('id', { ascending: false });
            if (!error && data) {
                allBooks = data;
                renderBooks();
            }
        }

        function renderBooks() {
            const tbody = document.getElementById('booksList');
            if (!allBooks.length) {
                tbody.innerHTML = '<tr><td colspan="5">No books found. Add some!</td></tr>';
                return;
            }
            tbody.innerHTML = allBooks.map(b => `
                <tr>
                    <td>${b.id}</td>
                    <td>${escapeHtml(b.title.substring(0, 50))}</td>
                    <td>${escapeHtml(b.author || '-')}</td>
                    <td>${escapeHtml(b.genre || '-')}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editBook(${b.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteBook(${b.id})"><i class="fas fa-trash"></i> Del</button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadStats() {
            const { count } = await supabase.from('books').select('*', { count: 'exact', head: true });
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="number">${count || 0}</div><div class="label">Total Books</div></div>
                <div class="stat-card"><div class="number">Public Domain</div><div class="label">License</div></div>
                <div class="stat-card"><div class="number">Free</div><div class="label">Access</div></div>
            `;
        }

        // ADD BOOK
        document.getElementById('addForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const book = {
                title: document.getElementById('addTitle').value.trim(),
                author: document.getElementById('addAuthor').value.trim(),
                genre: document.getElementById('addGenre').value.trim() || 'General',
                summary: document.getElementById('addSummary').value.trim() || 'No summary available',
                year: parseInt(document.getElementById('addYear').value) || null,
                cover_url: 'https://placehold.co/300x400/8B4513/white?text=Book'
            };
            const { error } = await supabase.from('books').insert(book);
            if (error) { showMsg(error.message, 'error'); return; }
            showMsg('Book added!', 'success');
            document.getElementById('addForm').reset();
            await loadData();
        });

        // EDIT
        window.editBook = async (id) => {
            const newTitle = prompt('Enter new title:');
            if (newTitle) {
                await supabase.from('books').update({ title: newTitle }).eq('id', id);
                await loadData();
                showMsg('Updated!', 'success');
            }
        };

        // DELETE
        window.deleteBook = async (id) => {
            if (confirm('Delete this book?')) {
                await supabase.from('books').delete().eq('id', id);
                await loadData();
                showMsg('Deleted!', 'success');
            }
        };

        // BULK UPLOAD
        document.getElementById('bulkUpload')?.addEventListener('click', async () => {
            const jsonText = document.getElementById('bulkJson').value.trim();
            if (!jsonText) { showMsg('Paste JSON first!', 'error'); return; }
            try {
                const books = JSON.parse(jsonText);
                let success = 0;
                for (const b of books) {
                    const { error } = await supabase.from('books').insert({
                        title: b.title, author: b.author, genre: b.genre || 'General',
                        summary: b.summary || 'No summary', year: b.year || null,
                        cover_url: 'https://placehold.co/300x400/8B4513/white?text=Book'
                    });
                    if (!error) success++;
                }
                showMsg(`Added ${success} books!`, 'success');
                await loadData();
            } catch (e) { showMsg('Invalid JSON!', 'error'); }
        });

        // TAB SWITCHING
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.getElementById('booksTab').style.display = tab === 'books' ? 'block' : 'none';
                document.getElementById('addTab').style.display = tab === 'add' ? 'block' : 'none';
                document.getElementById('bulkTab').style.display = tab === 'bulk' ? 'block' : 'none';
            });
        });

        function showMsg(msg, type) {
            const div = document.createElement('div');
            div.style.cssText = `position:fixed;bottom:20px;right:20px;background:${type === 'success' ? '#10b981' : '#ef4444'};color:white;padding:12px 20px;border-radius:8px;z-index:9999`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function (m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        // THEME
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>

</html>
